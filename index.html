<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Manager</title>
</head>

<body>

<h2>Party Manager</h2>

<button onclick="saveData()">💾 บันทึก</button>
<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://gjciyhywiabkngsoldgp.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqY2l5aHl3aWFia25nc29sZGdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTgzNDYsImV4cCI6MjA5Mjc5NDM0Nn0.uzEaD7bdrhJk9qZNfGUxiKDHEU8xxQ4pUy5vF3dGhDk";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ====== DATA ======
let data = {
  parties: [
    {
      name: "Party 1",
      members: [{ name: "Alice", cls: "priest" }]
    }
  ]
};

// ====== LOAD ======
async function loadData() {
  const { data: res, error } = await supabaseClient
    .from("party_rooms")
    .select("data")
    .eq("room_code", "PARTY001")
    .single();

  console.log("LOAD:", res, error);

  if (res && res.data) {
    data = res.data;
  }
}

// ====== SAVE ======
async function saveData() {
  const { data: result, error } = await supabaseClient
    .from("party_rooms")
    .update({ data: data })
    .eq("room_code", "PARTY001")
    .eq("admin_code", "ADMIN999");

  console.log("SAVE:", result, error);

  const el = document.getElementById("status");

  if (error) {
    el.innerText = "❌ save fail";
  } else if (!result || result.length === 0) {
    el.innerText = "❌ admin_code ผิด";
  } else {
    el.innerText = "✅ saved!";
  }
}

// ====== INIT ======
loadData();

</script>

</body>
</html>
